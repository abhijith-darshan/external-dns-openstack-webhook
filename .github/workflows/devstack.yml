name: devstack
on:
  pull_request:

env:
  OS_CLOUD: devstack-admin-demo

jobs:
  external-dns-source-fake:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout external-dns-openstack-webhook
        uses: actions/checkout@v7

      - name: Checkout kubernetes-sigs/external-dns
        uses: actions/checkout@v7
        with:
          repository: kubernetes-sigs/external-dns
          path: ./external-dns
          ref: v0.20.0

      - name: Checkout openstack/devstack
        uses: actions/checkout@v7
        with:
          repository: openstack/devstack
          ref: "stable/2025.2"
          path: ./devstack

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: |
            ./go.sum
            ./external-dns/go.sum

      - name: Install pip
        run: python -m pip install --upgrade pip

      - name: go build external-dns-openstack-webhook
        run: make build

      - name: go build external-dns
        run: make build
        working-directory: ./external-dns

      - name: Configure devstack
        run: |
          cat <<EOF > local.conf
          [[local|localrc]]
          ADMIN_PASSWORD=secret
          DATABASE_PASSWORD=root
          RABBIT_PASSWORD=secret
          SERVICE_PASSWORD=secret
          LOGFILE=/var/tmp/devstack.log
          USE_PYTHON3=True
          INSTALL_TEMPEST=False
          ENABLED_SERVICES=key,mysql,rabbit
          ENABLE_HTTPD_MOD_WSGI_SERVICES=True
          DESIGNATE_BACKEND_DRIVER=bind9

          enable_plugin designate https://opendev.org/openstack/designate stable/2025.2
          enable_service designate,designate-central,designate-api,designate-zone-manager,designate-mdns,designate-worker,designate-producer
          EOF
        working-directory: ./devstack
        shell: bash

      - name: Run stack.sh
        run: ./stack.sh
        working-directory: ./devstack

      - name: Restart Designate
        run: sudo systemctl restart "devstack@designate-*.service"

      - name: Create zones example.com
        run: |
          openstack zone create --email admin@example.com example.com.

      - name: Wait for zone creation
        run: |
          while [ "$(openstack zone list -f csv | grep PENDING)" != "" ]; do date; openstack zone list -f value; sleep 1; done

      - name: Start external-dns-openstack-webhook in background
        run: |
          ./build/bin/external-dns-openstack-webhook >/tmp/external-dns-openstack-webhook.log 2>&1 &

      - name: Run external-dns
        run: ./build/external-dns --txt-owner-id my-cluster-id --provider webhook --source fake --log-level=debug --once 2>&1
        working-directory: ./external-dns

      - name: Show /tmp/external-dns-openstack-webhook.log
        run: cat /tmp/external-dns-openstack-webhook.log

      - name: Wait for PENDING
        run: |
          while [ "$(openstack zone list -f csv | grep PENDING)" != "" ]; do date; openstack zone list -f value; sleep 1; done

      - name: Show created entries
        run: |
          echo "Zones:"
          openstack zone list -f value
          echo "Recordsets:"
          openstack recordset list all -f value

      - name: Check created entries
        run: |
          if [ $(openstack recordset list all -f value | grep -c " TXT ") -ne 10 ]; then exit 1; fi
          if [ $(openstack recordset list all -f value | grep -c " A ") -ne 10 ]; then exit 2; fi

      - name: Create cloud_admin project and zone for all-projects test
        run: |
          openstack --os-cloud devstack-admin project create cloud_admin
          CLOUD_ADMIN_PROJECT_ID=$(openstack --os-cloud devstack-admin project show cloud_admin -f value -c id)
          openstack --os-cloud devstack-admin zone create --email admin@cloud-admin.example.com cloud-admin.example.com. --sudo-project-id $CLOUD_ADMIN_PROJECT_ID
        shell: bash

      - name: Wait for cloud_admin zone creation
        run: |
          while [ "$(openstack --os-cloud devstack-admin zone list --all-projects -f csv | grep PENDING)" != "" ]; do date; openstack --os-cloud devstack-admin zone list --all-projects -f value; sleep 1; done

      - name: Start external-dns-openstack-webhook with --all-projects on port 8889
        run: |
          ./build/bin/external-dns-openstack-webhook --all-projects --domain-filter cloud-admin.example.com --webhook-server-address 127.0.0.1:8889 >/tmp/external-dns-openstack-webhook-all-projects.log 2>&1 &

      - name: Run external-dns against cloud_admin project zone
        run: ./build/external-dns --txt-owner-id my-cluster-id --provider webhook --webhook-provider-url http://127.0.0.1:8889 --source fake --log-level=debug --once 2>&1
        working-directory: ./external-dns

      - name: Show /tmp/external-dns-openstack-webhook-all-projects.log
        run: cat /tmp/external-dns-openstack-webhook-all-projects.log

      - name: Wait for all-projects PENDING
        run: |
          while [ "$(openstack --os-cloud devstack-admin zone list --all-projects -f csv | grep PENDING)" != "" ]; do date; openstack --os-cloud devstack-admin zone list --all-projects -f value; sleep 1; done

      - name: Check all-projects created entries
        run: |
          if [ $(openstack --os-cloud devstack-admin recordset list cloud-admin.example.com. --all-projects -f value | grep -c " TXT ") -ne 10 ]; then exit 1; fi
          if [ $(openstack --os-cloud devstack-admin recordset list cloud-admin.example.com. --all-projects -f value | grep -c " A ") -ne 10 ]; then exit 2; fi
