name: devstack
on:
  pull_request:

env:
  OS_CLOUD: devstack-admin-demo

jobs:
  external-dns-source-fake:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout external-dns-openstack-webhook
        uses: actions/checkout@v7

      - name: Checkout kubernetes-sigs/external-dns
        uses: actions/checkout@v7
        with:
          repository: kubernetes-sigs/external-dns
          path: ./external-dns
          ref: v0.20.0

      - name: Checkout openstack/devstack
        uses: actions/checkout@v7
        with:
          repository: openstack/devstack
          ref: "stable/2025.2"
          path: ./devstack

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: |
            ./go.sum
            ./external-dns/go.sum

      - name: Install pip
        run: python -m pip install --upgrade pip

      - name: go build external-dns-openstack-webhook
        run: make build

      - name: go build external-dns
        run: make build
        working-directory: ./external-dns

      - name: Configure devstack
        run: |
          cat <<EOF > local.conf
          [[local|localrc]]
          ADMIN_PASSWORD=secret
          DATABASE_PASSWORD=root
          RABBIT_PASSWORD=secret
          SERVICE_PASSWORD=secret
          LOGFILE=/var/tmp/devstack.log
          USE_PYTHON3=True
          INSTALL_TEMPEST=False
          ENABLED_SERVICES=key,mysql,rabbit
          ENABLE_HTTPD_MOD_WSGI_SERVICES=True
          DESIGNATE_BACKEND_DRIVER=bind9

          enable_plugin designate https://opendev.org/openstack/designate stable/2025.2
          enable_service designate,designate-central,designate-api,designate-zone-manager,designate-mdns,designate-worker,designate-producer
          EOF
        working-directory: ./devstack
        shell: bash

      - name: Run stack.sh
        run: ./stack.sh
        working-directory: ./devstack

      - name: Restart Designate
        run: sudo systemctl restart "devstack@designate-*.service"

      - name: Create zones example.com
        run: |
          openstack zone create --email admin@example.com example.com.

      - name: Wait for zone creation
        run: |
          while [ "$(openstack zone list -f value | grep PENDING)" != "" ]; do date; openstack zone list -f value; sleep 1; done

      - name: Diagnose zone provisioning (bind9 / worker)
        if: always()
        run: |
          echo "===== zone list ====="
          openstack zone list -f value || true
          echo "===== designate-worker journal ====="
          sudo journalctl -u "devstack@designate-worker.service" --no-pager -n 200 || true
          echo "===== designate-central journal ====="
          sudo journalctl -u "devstack@designate-central.service" --no-pager -n 100 || true
          echo "===== designate-mdns journal ====="
          sudo journalctl -u "devstack@designate-mdns.service" --no-pager -n 80 || true
          echo "===== named / bind9 status ====="
          sudo systemctl status bind9 named 2>/dev/null || true
          sudo journalctl -u bind9 -u named --no-pager -n 100 || true
          echo "===== listeners on 53 / 953 (rndc) ====="
          sudo ss -tulpn | grep -E ':53 |:953 ' || true
          echo "===== rndc status ====="
          sudo rndc -c /etc/bind/rndc.conf status || true
          echo "===== designate pools.yaml ====="
          sudo cat /etc/designate/pools.yaml || true
        shell: bash

      # TEMPORARILY COMMENTED OUT to speed up iteration on the all-projects test below.
      # RESTORE before pushing the final PR.
      # - name: Start external-dns-openstack-webhook in background
      #   run: |
      #     ./build/bin/external-dns-openstack-webhook >/tmp/external-dns-openstack-webhook.log 2>&1 &
      #
      # - name: Run external-dns
      #   run: ./build/external-dns --txt-owner-id my-cluster-id --provider webhook --source fake --log-level=debug --once 2>&1
      #   working-directory: ./external-dns
      #
      # - name: Show /tmp/external-dns-openstack-webhook.log
      #   run: cat /tmp/external-dns-openstack-webhook.log
      #
      # - name: Wait for PENDING
      #   run: |
      #     while [ "$(openstack zone list -f csv | grep PENDING)" != "" ]; do date; openstack zone list -f value; sleep 1; done
      #
      # - name: Show created entries
      #   run: |
      #     echo "Zones:"
      #     openstack zone list -f value
      #     echo "Recordsets:"
      #     openstack recordset list all -f value
      #
      # - name: Check created entries
      #   run: |
      #     if [ $(openstack recordset list all -f value | grep -c " TXT ") -ne 10 ]; then exit 1; fi
      #     if [ $(openstack recordset list all -f value | grep -c " A ") -ne 10 ]; then exit 2; fi

      - name: Create cloud_admin project and grant admin access
        run: |
          openstack --os-cloud devstack-admin project create cloud_admin
          openstack --os-cloud devstack-admin role add --project cloud_admin --user admin admin
        shell: bash

      - name: Add devstack-cloud-admin cloud entry (admin user scoped to cloud_admin project)
        run: |
          AUTH_URL=$(python3 -c "import yaml; print(yaml.safe_load(open('/etc/openstack/clouds.yaml'))['clouds']['devstack-admin']['auth']['auth_url'])")
          ./devstack/tools/update_clouds_yaml.py \
            --file /etc/openstack/clouds.yaml \
            --os-cloud devstack-cloud-admin \
            --os-region-name RegionOne \
            --os-auth-url "$AUTH_URL" \
            --os-username admin \
            --os-password secret \
            --os-project-name cloud_admin
        shell: bash

      - name: Start external-dns-openstack-webhook as cloud_admin with --all-projects on port 8889
        run: |
          OS_CLOUD=devstack-cloud-admin ./build/bin/external-dns-openstack-webhook --all-projects --domain-filter example.com --webhook-server-address 127.0.0.1:8889 >/tmp/external-dns-openstack-webhook-all-projects.log 2>&1 &

      - name: Run external-dns against example.com as cloud_admin project user
        run: ./build/external-dns --txt-owner-id all-projects-cluster-id --provider webhook --webhook-provider-url http://127.0.0.1:8889 --source fake --log-level=debug --once 2>&1
        working-directory: ./external-dns

      - name: Show /tmp/external-dns-openstack-webhook-all-projects.log
        run: cat /tmp/external-dns-openstack-webhook-all-projects.log

      - name: Check all-projects created entries in example.com
        run: |
          if [ $(openstack --os-cloud devstack-admin recordset list example.com. --all-projects -f value | grep -c "all-projects-cluster-id") -ne 10 ]; then exit 1; fi
